{% extends "base.html" %}
{% block title %}Crear Cuenta – HelloContact{% endblock %}

{% block content %}
<div class="auth-bg">
  <div class="auth-card">
    <div class="auth-logo-wrap">✍️</div>
    <h1 class="auth-title">Crear Cuenta</h1>
    <p class="auth-subtitle">Regístrate para empezar a gestionar tus contactos</p>

    <form method="POST" action="{{ url_for('registro') }}">
      <div class="form-group">
        <label class="form-label">Nombre Completo</label>
        <input type="text" class="form-input" placeholder="Tu nombre" required
                 oninvalid="this.setCustomValidity('Este campo es obligatorio')" oninput="this.setCustomValidity('')"/>
      </div>
      <div class="form-group">
        <label class="form-label">Nombre de Usuario</label>
        <input type="text" name="usuario" class="form-input" placeholder="Ej: admin" required
                 oninvalid="this.setCustomValidity('Por favor ingresa tu usuario')" oninput="this.setCustomValidity('')"/>
      </div>
      <div class="form-group">
        <label class="form-label">Contraseña</label>
        <input type="password" name="contrasena" class="form-input" placeholder="••••••••" required
                 oninvalid="this.setCustomValidity('Por favor ingresa tu contraseña')" oninput="this.setCustomValidity('')"/>
      </div>
      <button type="submit" class="btn btn-blue btn-full">Registrarse</button>
    </form>

    <p class="auth-footer">
      ¿Ya tienes una cuenta? <a href="{{ url_for('login') }}" class="auth-link">Iniciar sesión</a>
    </p>
  </div>
</div>
{% endblock %}
